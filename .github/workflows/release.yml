name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build signed DMG
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Resolve package dependencies
        run: swift package resolve

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          certificate_path="${RUNNER_TEMP}/developer-id-application.p12"
          keychain_path="${RUNNER_TEMP}/app-signing.keychain-db"

          printf '%s' "$MACOS_CERTIFICATE_BASE64" | base64 -D > "$certificate_path"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Build DMG
        env:
          CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
        run: Packaging/build_dmg.sh

      - name: Notarize and staple DMG
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          api_key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 -D > "$api_key_path"

          dmg_path="$(find dist -maxdepth 1 -name 'MacSnap-*.dmg' -print -quit)"
          if [[ -z "$dmg_path" ]]; then
            echo "No DMG found in dist." >&2
            exit 1
          fi

          xcrun notarytool submit "$dmg_path" \
            --key "$api_key_path" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$dmg_path"
          xcrun stapler validate "$dmg_path"

      - name: Generate Sparkle appcast
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: Packaging/generate_appcast.sh

      - name: Publish Sparkle appcast feed
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="main"
          content="$(base64 -i dist/appcast.xml | tr -d '\n')"
          existing_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/appcast.xml?ref=${branch}" --jq .sha 2>/dev/null || true)"
          args=(
            --method PUT
            "repos/${GITHUB_REPOSITORY}/contents/appcast.xml"
            -f message="Update Sparkle appcast for ${GITHUB_REF_NAME}"
            -f branch="${branch}"
            -f content="${content}"
          )
          if [[ -n "$existing_sha" ]]; then
            args+=(-f sha="$existing_sha")
          fi
          gh api "${args[@]}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacSnap-release-assets
          path: dist/*.dmg
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.dmg --clobber
          else
            gh release create "$tag" dist/*.dmg --title "MacSnap $tag" --generate-notes
          fi
